<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | VAGT Security Services</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <style>
    body { background: var(--navy); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .login-card { background:#fff; border-radius:12px; width:100%; max-width:420px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,0.45); }
    .login-header { background:#0b0e18; padding:32px 36px 28px; text-align:center; border-bottom:3px solid #e63946; }
    .login-logo-wrap { width:52px; height:52px; background:transparent; border-radius:8px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .login-logo-wrap img { width:100%; height:100%; object-fit:contain; }
    .login-badge { display:inline-block; background:rgba(230,57,70,0.18); color:#e63946; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:4px 12px; border-radius:20px; margin-bottom:12px; }
    .login-header h1 { font-size:18px; font-weight:700; color:#fff; margin-bottom:4px; }
    .login-header p { font-size:12px; color:rgba(255,255,255,0.4); }
    .login-body { padding:32px 36px 36px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text-mid); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:7px; }
    .form-group input { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:var(--font); color:var(--text); outline:none; transition:border-color 0.2s; background:var(--warm-white); }
    .form-group input:focus { border-color:#e63946; background:#fff; }
    .forgot-link { display:block; text-align:right; font-size:12px; color:#e63946; margin-top:-12px; margin-bottom:24px; }
    .btn-login { width:100%; padding:14px; background:#e63946; color:#fff; font-size:14px; font-weight:700; border:none; border-radius:8px; cursor:pointer; transition:background 0.2s; font-family:var(--font); }
    .btn-login:hover { background:#c0392b; }
    .btn-login:disabled { opacity:0.6; cursor:not-allowed; }
    .error-msg { background:#FEE2E2; color:#B91C1C; font-size:13px; padding:11px 14px; border-radius:6px; margin-bottom:18px; display:none; border-left:3px solid #B91C1C; }
    .login-footer { padding:16px 36px 20px; border-top:1px solid var(--border); text-align:center; }
    .login-footer p { font-size:12px; color:var(--text-faint); }
    .login-footer a { color:#e63946; font-weight:600; }
    .security-note { background:#fff3cd; border:1px solid #ffc107; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:12px; color:#856404; display:flex; gap:8px; align-items:flex-start; }
    .security-note svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; margin-top:1px; }
    .back-link { display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:24px; justify-content:center; text-decoration:none; }
    .back-link:hover { color:rgba(255,255,255,0.6); }
    .back-link svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; }
  </style>
</head>
<body>

<div style="width:100%; max-width:420px;">
  <a href="../index.html" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to vagtservices.com
  </a>

  <div class="login-card">
    <div class="login-header">
      <div class="login-badge">Admin Access — Restricted</div>
      <div class="login-logo-wrap">
        <img src="../assets/images/logos/vagt-logo.png" alt="VAGT">
      </div>
      <h1>Admin Panel</h1>
      <p>VAGT Security — Internal Use Only</p>
    </div>

    <div class="login-body">
      <div class="security-note">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        This panel contains employee and client data. Only authorised VAGT administrators may proceed.
      </div>

      <div class="error-msg" id="error-msg"></div>

      <form id="admin-login-form" autocomplete="off">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" name="email" placeholder="admin@vagtservices.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
        <button type="submit" class="btn-login" id="login-btn">Sign In to Admin Panel</button>
      </form>
    </div>

    <div class="login-footer">
      <p>Not an admin? <a href="employee-portal.html">Employee login →</a></p>
      <p style="margin-top:6px;">Problems? <a href="contact.html">Contact VAGT IT</a></p>
    </div>
  </div>
</div>

<script type="module">
  import { auth } from "../assets/js/firebase-config.js";
  import { loginWithRole, handleAuthError } from "../assets/js/vagt-auth.js";
  import { onAuthStateChanged, sendPasswordResetEmail }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const btn     = document.getElementById('login-btn');
  const errEl   = document.getElementById('error-msg');

  function showError(msg)   { errEl.textContent = msg; errEl.style.cssText = 'display:block; background:#FEE2E2; color:#B91C1C; border-left:3px solid #B91C1C; padding:11px 14px; border-radius:6px; margin-bottom:18px; font-size:13px;'; }
  function showSuccess(msg) { errEl.textContent = msg; errEl.style.cssText = 'display:block; background:#D1FAE5; color:#065F46; border-left:3px solid #065F46; padding:11px 14px; border-radius:6px; margin-bottom:18px; font-size:13px;'; }

  const authErr = handleAuthError();
  if (authErr) showError(authErr);

  // Already authenticated? Skip login
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'admin-dashboard.html';
  });

  document.getElementById('admin-login-form').addEventListener('submit', async e => {
    e.preventDefault();
    btn.disabled = true; btn.textContent = 'Verifying…';
    errEl.style.display = 'none';
    await loginWithRole(
      document.getElementById('email').value.trim(),
      document.getElementById('password').value,
      'admin',
      'admin-dashboard.html',
      msg => { showError(msg); btn.disabled = false; btn.textContent = 'Sign In to Admin Panel'; }
    );
  });

  document.getElementById('forgot-link').addEventListener('click', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Enter your admin email address above first.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess('Password reset email sent to ' + email);
    } catch (_) { showError('Could not send reset email. Contact VAGT IT.'); }
  });
</script>

</body>
</html>
