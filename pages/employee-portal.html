<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Portal | VAGT Security Services</title>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <style>
    body { background: var(--navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }
    .login-header {
      background: var(--navy);
      padding: 32px 36px 28px;
      text-align: center;
      border-bottom: 3px solid var(--amber);
    }
    .login-header .login-logo-wrap {
      width: 100px; height: 46px;
      background: var(--amber);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      padding: 6px 10px;
    }
    .login-header .login-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .login-header h1 { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
    .login-header p { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.5px; }
    .login-badge {
      display: inline-block;
      background: rgba(245,196,0,0.15);
      color: var(--amber);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .login-body { padding: 32px 36px 36px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
    .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      background: var(--warm-white);
    }
    .form-group input:focus { border-color: var(--amber); background: #fff; }
    .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--amber); margin-top: -12px; margin-bottom: 24px; }
    .forgot-link:hover { text-decoration: underline; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--navy);
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
      font-family: var(--font);
    }
    .btn-login:hover { background: var(--navy-400); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #FEE2E2;
      color: #B91C1C;
      font-size: 13px;
      padding: 11px 14px;
      border-radius: 6px;
      margin-bottom: 18px;
      display: none;
      border-left: 3px solid #B91C1C;
    }
    .login-footer { padding: 16px 36px 20px; border-top: 1px solid var(--border); text-align: center; }
    .login-footer p { font-size: 12px; color: var(--text-faint); }
    .login-footer a { color: var(--amber); font-weight: 600; }
    .back-link { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 24px; justify-content: center; }
    .back-link:hover { color: rgba(255,255,255,0.7); }
    .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
  </style>
</head>
<body>

<div style="width:100%; max-width:420px;">
  <a href="../index.html" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to vagtservices.com
  </a>

  <div class="login-card">
    <div class="login-header">
      <div class="login-badge">Employee Login</div>
      <div class="login-logo-wrap">
        <img src="../assets/images/logos/vagt-logo-white.png" alt="VAGT">
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to access your VAGT employee account</p>
    </div>

    <div class="login-body">
      <div class="error-msg" id="error-msg"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email"/>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>

        <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>

        <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      </form>
    </div>

    <div class="login-footer">
      <p>Not an employee? <a href="client-portal.html">Client login →</a></p>
      <p style="margin-top:6px;">Problems signing in? <a href="contact.html">Get help</a></p>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  import { firebaseConfig } from "../assets/js/firebase-config.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Redirect if already logged in
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'employee-dashboard.html';
  });

  const form = document.getElementById('login-form');
  const btn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errorMsg.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged will handle redirect
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Sign In';
      const codes = {
        'auth/user-not-found': 'No account found with that email.',
        'auth/wrong-password': 'Incorrect password. Please try again.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/too-many-requests': 'Too many attempts. Please wait a few minutes.',
        'auth/invalid-credential': 'Invalid email or password.',
      };
      showError(codes[err.code] || 'Sign in failed. Please try again.');
    }
  });

  document.getElementById('forgot-link').addEventListener('click', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Enter your email address above first.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      errorMsg.style.background = '#D1FAE5';
      errorMsg.style.color = '#065F46';
      errorMsg.style.borderColor = '#065F46';
      errorMsg.textContent = 'Password reset email sent. Check your inbox.';
      errorMsg.style.display = 'block';
    } catch (err) {
      showError('Could not send reset email. Check the address and try again.');
    }
  });
</script>

</body>
</html>
