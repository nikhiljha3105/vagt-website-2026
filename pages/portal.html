<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Login | VAGT Security Services</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="description" content="VAGT Security Services — secure staff portal. Restricted access."/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
</head>
<body>
<div class="portal-login-wrap">
  <div class="portal-login-card">

    <div class="portal-login-header">
      <div style="margin-bottom:20px;">
        <img src="../assets/images/logos/vagt-logo-actual.jpg" alt="VAGT Security Services" style="height:34px; opacity:0.95;"/>
      </div>
      <div class="portal-login-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <div class="portal-role-badge" id="roleBadge">VAGT Staff Portal</div>
      <h2 id="formTitle">Sign in to your account</h2>
      <p id="formSub">Enter your credentials — you'll be taken directly to your portal.</p>
    </div>

    <div class="portal-login-body">

      <!-- ── Login form (shown on load) ── -->
      <div id="stepLogin">

        <!-- Tab switcher: Email or Guard Keycode -->
        <div id="loginTabs" style="display:flex; margin-bottom:20px; border-bottom:2px solid var(--border);">
          <button id="tabEmail"   class="login-tab login-tab-active" onclick="switchTab('email')">Email / Password</button>
          <button id="tabKeycode" class="login-tab"                  onclick="switchTab('keycode')">Guard Keycode</button>
        </div>

        <div id="loginError" class="portal-error" style="display:none;" role="alert"></div>

        <!-- Email / Password panel -->
        <div id="panelEmail">
          <form id="loginForm" novalidate>
            <div class="form-group" style="margin-bottom:16px;">
              <label for="loginEmail">Work email</label>
              <input type="email" id="loginEmail" autocomplete="email" required
                     placeholder="name@vagtsecurityservices.com"/>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
              <label for="loginPass">Password</label>
              <input type="password" id="loginPass" autocomplete="current-password" required
                     placeholder="••••••••"/>
            </div>
            <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center;"
                    id="signInBtn">Sign In</button>
          </form>
          <div style="text-align:center; margin-top:14px;">
            <button class="portal-forgot-link" onclick="goToForgot()">Forgot password?</button>
          </div>
        </div>

        <!-- Guard Keycode panel -->
        <div id="panelKeycode" style="display:none;">
          <p style="font-size:12px; color:var(--text-muted); margin:0 0 16px;">
            Enter the keycode printed on your VAGT access card.
          </p>
          <form id="keycodeForm" novalidate>
            <div class="form-group" style="margin-bottom:24px;">
              <label for="keycodeInput">Access Keycode</label>
              <input type="text" id="keycodeInput" autocomplete="off" required
                     placeholder="XXXX-XXXX" maxlength="9"
                     style="text-transform:uppercase; letter-spacing:3px; font-size:20px; font-weight:700; text-align:center;"/>
            </div>
            <div id="geoStatus" style="font-size:11px; color:var(--text-muted); margin-bottom:12px; display:none;"></div>
            <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center;"
                    id="keycodeBtn">Sign In with Keycode</button>
          </form>
        </div>

        <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted);">
          New guard? <a href="register.html" style="color:var(--navy);">Create your account →</a>
        </div>
        <div style="text-align:center; margin-top:10px;">
          <a href="../index.html" style="font-size:12px; color:var(--text-muted); text-decoration:none;">← Back to VAGT home</a>
        </div>
      </div>

      <!-- ── Forgot password ── -->
      <div id="stepForgot" style="display:none;">
        <div id="forgotSuccess" class="portal-success-msg" style="display:none;" role="status"></div>
        <div id="forgotError"   class="portal-error"       style="display:none;" role="alert"></div>
        <form id="forgotForm" novalidate>
          <div class="form-group" style="margin-bottom:24px;">
            <label for="forgotEmail">Your work email</label>
            <input type="email" id="forgotEmail" autocomplete="email" required
                   placeholder="name@vagtsecurityservices.com"/>
          </div>
          <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center;"
                  id="forgotBtn">Send Reset Link</button>
        </form>
        <div style="text-align:center; margin-top:14px;">
          <button class="portal-forgot-link" onclick="goBackToLogin()">← Back to sign in</button>
        </div>
      </div>

    </div><!-- /portal-login-body -->
  </div><!-- /portal-login-card -->
</div><!-- /portal-login-wrap -->

<style>
  .portal-login-wrap { background: #f0f0ec; }
  .portal-forgot-link {
    background: none; border: none; cursor: pointer;
    font-size: 12px; color: var(--text-muted); text-decoration: underline;
  }
  .portal-forgot-link:hover { color: var(--navy); }
  .login-tab {
    background: none; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    padding: 8px 14px 10px; border-bottom: 2px solid transparent; margin-bottom: -2px;
  }
  .login-tab-active { color: var(--navy); border-bottom-color: var(--navy); }
  .login-tab:hover:not(.login-tab-active) { color: var(--text); }
</style>

<!-- Firebase v10 compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script>
(function () {
  'use strict';

  // ── Init ──────────────────────────────────────────────────────────────────
  let auth;
  try {
    const app = firebase.apps.length === 0
      ? firebase.initializeApp(FIREBASE_CONFIG)
      : firebase.app();
    auth = app.auth();
  } catch (e) {
    document.getElementById('loginError').textContent = 'Portal is not configured. Contact your VAGT administrator.';
    document.getElementById('loginError').style.display = '';
    return;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function show(id)       { document.getElementById(id).style.display = ''; }
  function hide(id)       { document.getElementById(id).style.display = 'none'; }
  function setText(id, t) { document.getElementById(id).textContent = t; }
  function showErr(msg)   { setText('loginError', msg); show('loginError'); }

  // ── Role → portal redirect ─────────────────────────────────────────────────
  function redirectByRole(role) {
    if      (role === 'admin')  window.location.href = 'admin-portal.html';
    else if (role === 'client') window.location.href = 'client-portal.html';
    else                        window.location.href = 'employee-portal.html';
  }

  // ── Tab switcher ──────────────────────────────────────────────────────────
  window.switchTab = function (tab) {
    hide('loginError');
    if (tab === 'keycode') {
      hide('panelEmail'); show('panelKeycode');
      document.getElementById('tabEmail').classList.remove('login-tab-active');
      document.getElementById('tabKeycode').classList.add('login-tab-active');
    } else {
      show('panelEmail'); hide('panelKeycode');
      document.getElementById('tabKeycode').classList.remove('login-tab-active');
      document.getElementById('tabEmail').classList.add('login-tab-active');
    }
  };

  // ── Keycode input: auto-insert dash after 4 chars ─────────────────────────
  document.getElementById('keycodeInput').addEventListener('input', function (e) {
    let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (v.length > 4) v = v.slice(0, 4) + '-' + v.slice(4, 8);
    e.target.value = v;
  });

  // ── Keycode sign-in ───────────────────────────────────────────────────────
  document.getElementById('keycodeForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('keycodeBtn');
    const geoStatus = document.getElementById('geoStatus');
    hide('loginError');
    btn.disabled = true;
    btn.textContent = 'Locating…';
    show('geoStatus');
    geoStatus.textContent = 'Capturing your location…';

    const keycode = document.getElementById('keycodeInput').value.trim().toUpperCase();
    if (!/^[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(keycode)) {
      showErr('Please enter a valid keycode in the format XXXX-XXXX.');
      btn.disabled = false; btn.textContent = 'Sign In with Keycode';
      hide('geoStatus');
      return;
    }

    let latitude = null, longitude = null, accuracy = null;
    try {
      const pos = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000, maximumAge: 0 })
      );
      latitude  = pos.coords.latitude;
      longitude = pos.coords.longitude;
      accuracy  = pos.coords.accuracy;
      geoStatus.textContent = 'Location captured.';
    } catch {
      geoStatus.textContent = 'Location unavailable — proceeding without GPS.';
    }

    btn.textContent = 'Signing in…';
    try {
      const resp = await fetch('/api/auth/guard/keycode-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keycode, latitude, longitude, accuracy, device_info: navigator.userAgent }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        showErr(data.message || 'Sign-in failed. Please try again.');
        btn.disabled = false; btn.textContent = 'Sign In with Keycode';
        hide('geoStatus');
        return;
      }
      await auth.signInWithCustomToken(data.custom_token);
      // onAuthStateChanged handles the redirect
    } catch (err) {
      showErr('Network error. Check your connection and try again.');
      btn.disabled = false; btn.textContent = 'Sign In with Keycode';
      hide('geoStatus');
    }
  });

  // ── Email sign-in ─────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('signInBtn');
    hide('loginError');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;

    try {
      const cred  = await auth.signInWithEmailAndPassword(email, pass);
      const token = await cred.user.getIdTokenResult();
      redirectByRole(token.claims.role);
    } catch (err) {
      showErr(friendlyError(err.code));
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  });

  // ── Forgot password ───────────────────────────────────────────────────────
  window.goToForgot = function () {
    hide('stepLogin'); show('stepForgot');
    hide('forgotError'); hide('forgotSuccess');
    setText('roleBadge', 'Password Reset');
    setText('formTitle', 'Reset your password');
    setText('formSub',   'We\'ll send a reset link to your registered work email.');
  };

  window.goBackToLogin = function () {
    hide('stepForgot'); show('stepLogin');
    setText('roleBadge', 'VAGT Staff Portal');
    setText('formTitle', 'Sign in to your account');
    setText('formSub',   'Enter your credentials — you\'ll be taken directly to your portal.');
  };

  document.getElementById('forgotForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('forgotBtn');
    hide('forgotError'); hide('forgotSuccess');
    btn.textContent = 'Sending…';
    btn.disabled = true;
    try {
      await auth.sendPasswordResetEmail(document.getElementById('forgotEmail').value.trim());
      document.getElementById('forgotSuccess').textContent =
        'Reset link sent. Check your inbox — it may take a couple of minutes to arrive.';
      show('forgotSuccess');
    } catch (err) {
      document.getElementById('forgotError').textContent = friendlyError(err.code);
      show('forgotError');
    }
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
  });

  // ── Already logged in → redirect immediately ──────────────────────────────
  auth.onAuthStateChanged(function (user) {
    if (!user) return;
    user.getIdTokenResult().then(function (t) {
      redirectByRole(t.claims.role);
    });
  });

  // ── Error messages ────────────────────────────────────────────────────────
  function friendlyError(code) {
    const map = {
      'auth/invalid-credential':     'Incorrect email or password.',
      'auth/user-not-found':         'No account found with that email address.',
      'auth/wrong-password':         'Incorrect password. Please try again.',
      'auth/invalid-email':          'Please enter a valid email address.',
      'auth/too-many-requests':      'Too many failed attempts. Please wait a few minutes and try again.',
      'auth/user-disabled':          'This account has been disabled. Contact your manager.',
      'auth/network-request-failed': 'Network error. Check your connection and try again.',
    };
    return map[code] || 'Something went wrong. Please try again or contact support.';
  }

})();
</script>
</body>
</html>
