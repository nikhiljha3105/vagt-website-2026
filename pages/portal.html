<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Login | VAGT Security Services</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="description" content="VAGT Security Services — secure staff portal. Restricted access."/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <meta http-equiv="Cache-Control" content="no-store"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <style>
    .portal-login-wrap { background: #f0f0ec; }
    .portal-login-card { border-radius: 0; }
    .role-card { width: 100%; text-align: left; cursor: pointer; background: var(--white); }
    .role-card[disabled] { opacity: 0.45; cursor: default; pointer-events: none; }
  </style>
</head>
<body>
<div class="portal-login-wrap">
  <div class="portal-login-card">

    <div class="portal-login-header">
      <div class="portal-login-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <div class="portal-role-badge" id="roleBadge">VAGT Portals</div>
      <h2 id="formTitle">Choose your access level</h2>
      <p id="formSub">Select your role to continue to the secure login area.</p>
    </div>

    <div class="portal-login-body">

      <!-- ── Step 1: Role picker ── -->
      <div id="stepPicker">
        <div class="role-picker-grid">

          <button class="role-card" onclick="goToLogin()">
            <div class="role-card-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
            <div class="role-card-label">Employee</div>
            <div class="role-card-sub">Guards, supervisors &amp; field staff</div>
            <div class="role-card-arrow">→</div>
          </button>

          <button class="role-card" onclick="goToLogin()">
            <div class="role-card-icon">
              <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <div class="role-card-label">Client</div>
            <div class="role-card-sub">View deployments &amp; reports</div>
            <div class="role-card-arrow">→</div>
          </button>

          <button class="role-card" onclick="goToLogin()">
            <div class="role-card-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </div>
            <div class="role-card-label">Admin</div>
            <div class="role-card-sub">Operations &amp; management</div>
            <div class="role-card-arrow">→</div>
          </button>

        </div>
        <div style="text-align:center; margin-top:22px;">
          <a href="../index.html" style="font-size:12px; color:var(--text-muted); text-decoration:none;">← Back to VAGT home</a>
        </div>
      </div>

      <!-- ── Step 2: Login form ── -->
      <div id="stepLogin" style="display:none;">
        <div id="loginError" class="portal-error" style="display:none;" role="alert"></div>
        <form id="loginForm" novalidate>
          <div class="form-group" style="margin-bottom:16px;">
            <label for="loginEmail">Work email</label>
            <input type="email" id="loginEmail" autocomplete="email" required
                   placeholder="name@vagtsecurityservices.com"/>
          </div>
          <div class="form-group" style="margin-bottom:24px;">
            <label for="loginPass">Password</label>
            <input type="password" id="loginPass" autocomplete="current-password" required
                   placeholder="••••••••"/>
          </div>
          <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center;"
                  id="signInBtn">Sign In</button>
        </form>
        <div style="text-align:center; margin-top:14px;">
          <button class="portal-forgot-link" onclick="goToForgot()">Forgot password?</button>
        </div>
        <div style="text-align:center; margin-top:10px;">
          <button class="portal-forgot-link" onclick="goBack()">← Back to role selection</button>
        </div>
      </div>

      <!-- ── Step 3: Forgot password ── -->
      <div id="stepForgot" style="display:none;">
        <div id="forgotSuccess" class="portal-success-msg" style="display:none;" role="status"></div>
        <div id="forgotError" class="portal-error" style="display:none;" role="alert"></div>
        <form id="forgotForm" novalidate>
          <div class="form-group" style="margin-bottom:24px;">
            <label for="forgotEmail">Your work email</label>
            <input type="email" id="forgotEmail" autocomplete="email" required
                   placeholder="name@vagtsecurityservices.com"/>
          </div>
          <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center;"
                  id="forgotBtn">Send Reset Link</button>
        </form>
        <div style="text-align:center; margin-top:14px;">
          <button class="portal-forgot-link" onclick="goToLogin()">← Back to sign in</button>
        </div>
      </div>

    </div><!-- /portal-login-body -->
  </div><!-- /portal-login-card -->
</div><!-- /portal-login-wrap -->

<style>
  .portal-forgot-link {
    background: none; border: none; cursor: pointer;
    font-size: 12px; color: var(--text-muted); text-decoration: underline;
  }
  .portal-forgot-link:hover { color: var(--navy); }
</style>

<!-- Firebase v10 compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<!-- Your Firebase project config — copy firebase-config.example.js → firebase-config.js and fill in values -->
<script src="../assets/js/firebase-config.js"></script>
<script>
(function () {
  'use strict';

  // ── Init ──────────────────────────────────────────────────────────────────
  let auth;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
  } catch (e) {
    showEl('loginError', 'Portal is not configured. Contact your VAGT administrator.');
    hide('stepPicker');
    show('stepLogin');
    return;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function show(id)      { document.getElementById(id).style.display = ''; }
  function hide(id)      { document.getElementById(id).style.display = 'none'; }
  function setText(id,t) { document.getElementById(id).textContent = t; }
  function showEl(id,msg){ document.getElementById(id).textContent = msg; show(id); }

  function setHeader(badge, title, sub) {
    setText('roleBadge', badge);
    setText('formTitle', title);
    setText('formSub',   sub);
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  window.goToLogin = function () {
    hide('stepPicker'); hide('stepForgot'); show('stepLogin');
    hide('loginError');
    setHeader('Employee Login', 'Sign in to your account',
              'Use the email and password provided by your VAGT manager.');
  };

  window.goToForgot = function () {
    hide('stepLogin'); hide('stepPicker'); show('stepForgot');
    hide('forgotError'); hide('forgotSuccess');
    setHeader('Password Reset', 'Reset your password',
              'We\'ll send a reset link to your registered work email.');
  };

  window.goBack = function () {
    hide('stepLogin'); hide('stepForgot'); show('stepPicker');
    setHeader('VAGT Portals', 'Choose your access level',
              'Select your role to continue to the secure login area.');
  };

  // ── Sign in ───────────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn   = document.getElementById('signInBtn');
    hide('loginError');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;

    try {
      const cred  = await auth.signInWithEmailAndPassword(email, pass);
      const token = await cred.user.getIdTokenResult();
      const role  = token.claims.role;

      if      (role === 'admin')    window.location.href = 'admin-portal.html';
      else if (role === 'client')   window.location.href = 'client-portal.html';
      else                          window.location.href = 'employee-portal.html'; // employee or unset
    } catch (err) {
      showEl('loginError', friendlyError(err.code));
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  });

  // ── Forgot password ───────────────────────────────────────────────────────
  document.getElementById('forgotForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('forgotBtn');
    hide('forgotError'); hide('forgotSuccess');
    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      await auth.sendPasswordResetEmail(document.getElementById('forgotEmail').value.trim());
      showEl('forgotSuccess',
        'Reset link sent. Check your inbox — it may take a couple of minutes to arrive.');
    } catch (err) {
      showEl('forgotError', friendlyError(err.code));
    }
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
  });

  // ── Already logged in → redirect ──────────────────────────────────────────
  auth.onAuthStateChanged(function (user) {
    if (!user) return;
    user.getIdTokenResult().then(function (t) {
      if      (t.claims.role === 'admin')  window.location.href = 'admin-portal.html';
      else if (t.claims.role === 'client') window.location.href = 'client-portal.html';
      else                                 window.location.href = 'employee-portal.html';
    });
  });

  // ── Error messages ────────────────────────────────────────────────────────
  function friendlyError(code) {
    const map = {
      'auth/invalid-credential':       'Incorrect email or password.',
      'auth/user-not-found':           'No account found with that email address.',
      'auth/wrong-password':           'Incorrect password. Please try again.',
      'auth/invalid-email':            'Please enter a valid email address.',
      'auth/too-many-requests':        'Too many failed attempts. Please wait a few minutes and try again.',
      'auth/user-disabled':            'This account has been disabled. Contact your manager.',
      'auth/network-request-failed':   'Network error. Check your connection and try again.',
    };
    return map[code] || 'Something went wrong. Please try again or contact support.';
  }

})();
</script>
</body>
</html>
