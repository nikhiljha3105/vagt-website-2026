<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Reports | VAGT Client Portal</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="description" content="VAGT Security Services — secure staff portal. Restricted access."/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <meta http-equiv="Cache-Control" content="no-store"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <style>
    .client-sidebar-profile { padding:14px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.07); }
    .client-sidebar-name    { font-size:13px; font-weight:700; color:var(--white); line-height:1.3; margin-bottom:2px; }
    .client-sidebar-company { font-size:11px; color:var(--amber); font-weight:700; letter-spacing:0.5px; margin-bottom:4px; }
    .client-sidebar-role    { font-size:10.5px; color:rgba(255,255,255,0.38); }
    #authOverlay {
      position:fixed; inset:0; background:var(--white);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; font-size:13px; color:var(--text-muted);
    }
    .page-content { padding: 40px 56px; }
    @media (max-width: 900px) { .page-content { padding: 28px 24px; } }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; align-items: flex-end;
    }
    .filter-bar .form-group { margin: 0; }
    .filter-bar label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-faint); display: block; margin-bottom: 5px; }
    .filter-bar select, .filter-bar input[type="month"] {
      font-size: 12px; padding: 8px 10px; border: 1px solid var(--border);
      background: var(--white); color: var(--text); outline: none; min-width: 140px;
    }

    /* ── Report card ── */
    .report-card {
      background: var(--white); border: 1px solid var(--border);
      padding: 20px 22px; margin-bottom: 12px;
    }
    .report-card-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 10px; }
    .report-date {
      min-width: 44px; text-align: center; border: 1px solid var(--border); padding: 6px 4px; flex-shrink: 0;
    }
    .report-date-day   { font-size: 18px; font-weight: 900; color: var(--navy); line-height: 1; }
    .report-date-month { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .report-meta       { flex: 1; min-width: 0; }
    .report-site  { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
    .report-guard { font-size: 11px; color: var(--text-muted); }
    .report-type-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px;
      padding: 3px 10px; background: rgba(13,31,60,0.07); color: var(--navy); flex-shrink: 0;
    }
    .report-summary { font-size: 13px; color: var(--text-mid); line-height: 1.6; }
    .report-details {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
      font-size: 12.5px; color: var(--text-muted); line-height: 1.7;
      display: none;
    }
    .report-toggle {
      font-size: 11px; font-weight: 600; color: var(--navy);
      background: none; border: none; cursor: pointer; margin-top: 8px; padding: 0;
    }
    .report-toggle:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div id="authOverlay">Checking access…</div>
<button class="mobile-nav-toggle" id="navToggle" aria-label="Open navigation" style="display:none;">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<div class="layout" id="portalLayout" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="../index.html" class="logo-link">
        <div class="logo-img-wrap"><img src="../assets/images/logos/vagt-logo-white.png" alt="VAGT" class="logo-img"></div>
        <div class="logo-text-block"><div class="logo-wordmark">VAGT</div><div class="logo-sub">Security Services</div></div>
      </a>
    </div>
    <div class="client-sidebar-profile">
      <div class="client-sidebar-name" id="sidebarName">—</div>
      <div class="client-sidebar-company" id="sidebarCompany">—</div>
      <div class="client-sidebar-role">Client</div>
    </div>
    <nav class="sidebar-nav" aria-label="Client portal">
      <div class="nav-group-label">My Portal</div>
      <a href="client-portal.html" class="nav-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a href="client-reports.html" class="nav-link active">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Daily Reports
      </a>
      <a href="client-invoices.html" class="nav-link">
        <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Invoices
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="signOutBtn" class="btn btn-ghost portal-signout" style="margin:0 20px 12px;">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="section-label">Client Portal</div>
      <h1>Daily Reports</h1>
      <p>Guard shift logs and incident reports for your sites.</p>
    </div>
    <div class="page-content">

      <!-- Filters -->
      <div class="filter-bar">
        <div class="form-group">
          <label>Site</label>
          <select id="filterSite"><option value="">All sites</option></select>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="filterType">
            <option value="">All types</option>
            <option value="daily_log">Daily Log</option>
            <option value="incident">Incident</option>
            <option value="inspection">Inspection</option>
          </select>
        </div>
        <div class="form-group">
          <label>Month</label>
          <input type="month" id="filterMonth" value=""/>
        </div>
        <button id="applyFilters" class="btn btn-amber" style="font-size:12px; padding:9px 18px; align-self:flex-end;">Apply</button>
      </div>

      <div id="reportsWrap">
        <div style="font-size:13px; color:var(--text-muted);">Loading reports…</div>
      </div>

    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script>
(function () {
  'use strict';
  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let currentUid = null;

  function setText(id, t) { const el = document.getElementById(id); if (el) el.textContent = t; }
  function setHTML(id, h) { const el = document.getElementById(id); if (el) el.innerHTML = h;   }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Set default month to current
  (function () {
    const d = new Date();
    document.getElementById('filterMonth').value =
      d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  })();

  document.getElementById('navToggle').addEventListener('click', function () {
    document.getElementById('sidebar').classList.toggle('open');
  });
  document.getElementById('signOutBtn').addEventListener('click', function () {
    auth.signOut().then(function () { window.location.href = 'portal.html'; });
  });

  auth.onAuthStateChanged(async function (user) {
    if (!user) { window.location.href = 'portal.html'; return; }
    const token = await user.getIdTokenResult();
    if (token.claims.role !== 'client') { window.location.href = 'portal.html'; return; }
    currentUid = user.uid;
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('portalLayout').style.display = '';
    document.getElementById('navToggle').style.display = '';
    loadProfile(user.uid);
    loadSites(user.uid);
    loadReports();
  });

  async function loadProfile(uid) {
    try {
      const snap = await db.collection('clients').doc(uid).get();
      if (!snap.exists) return;
      const d = snap.data();
      setText('sidebarName', d.name || '—');
      setText('sidebarCompany', d.company_name || '—');
    } catch (e) { console.error(e); }
  }

  async function loadSites(uid) {
    try {
      const snap = await db.collection('sites').where('client_uid', '==', uid).get();
      const sel = document.getElementById('filterSite');
      snap.docs.forEach(doc => {
        const opt = document.createElement('option');
        opt.value = doc.id;
        opt.textContent = doc.data().name;
        sel.appendChild(opt);
      });
    } catch (e) { console.error(e); }
  }

  async function loadReports() {
    const siteId = document.getElementById('filterSite').value;
    const type   = document.getElementById('filterType').value;
    const month  = document.getElementById('filterMonth').value;

    setHTML('reportsWrap', '<div style="font-size:13px;color:var(--text-muted);">Loading…</div>');

    try {
      let query = db.collection('daily_reports')
        .where('site_client_uid', '==', currentUid)
        .orderBy('date', 'desc');

      if (siteId) query = query.where('site_id', '==', siteId);
      if (type)   query = query.where('report_type', '==', type);
      if (month) {
        query = query.where('date', '>=', month + '-01').where('date', '<=', month + '-31');
      }

      const snap = await query.limit(50).get();

      if (snap.empty) {
        setHTML('reportsWrap', '<div class="portal-empty-state"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>No reports found for the selected filters.</div>');
        return;
      }

      const html = snap.docs.map((doc, idx) => {
        const d = doc.data();
        const dt = d.date ? new Date(d.date + 'T00:00:00') : null;
        const day = dt ? dt.getDate() : '—';
        const mon = dt ? dt.toLocaleString('en-IN', { month: 'short' }).toUpperCase() : '';
        const typeLabel = { daily_log: 'Daily Log', incident: 'Incident', inspection: 'Inspection' }[d.report_type] || d.report_type;
        const detailsBlock = d.details
          ? `<div class="report-details" id="det-${idx}">${esc(d.details)}</div>
             <button class="report-toggle" onclick="toggleDetails(${idx})">Show details ↓</button>`
          : '';
        return `
          <div class="report-card">
            <div class="report-card-header">
              <div class="report-date">
                <div class="report-date-day">${day}</div>
                <div class="report-date-month">${mon}</div>
              </div>
              <div class="report-meta">
                <div class="report-site">${esc(d.site_name || 'Unknown site')}</div>
                <div class="report-guard">Guard: ${esc(d.guard_name || '—')}</div>
              </div>
              <div class="report-type-badge">${esc(typeLabel)}</div>
            </div>
            <div class="report-summary">${esc(d.summary || 'No summary available.')}</div>
            ${detailsBlock}
          </div>`;
      }).join('');
      setHTML('reportsWrap', html);
    } catch (e) {
      console.error(e);
      setHTML('reportsWrap', '<div style="font-size:13px;color:var(--text-muted);">Could not load reports.</div>');
    }
  }

  window.toggleDetails = function (idx) {
    const el  = document.getElementById('det-' + idx);
    const btn = el ? el.nextElementSibling : null;
    if (!el || !btn) return;
    const expanded = el.style.display === 'block';
    el.style.display  = expanded ? 'none' : 'block';
    btn.textContent   = expanded ? 'Show details ↓' : 'Hide details ↑';
  };

  document.getElementById('applyFilters').addEventListener('click', loadReports);
})();
</script>
</body>
</html>
