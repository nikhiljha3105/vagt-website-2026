<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Incident Reports | VAGT Employee Portal</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="description" content="VAGT Security Services — secure staff portal. Restricted access."/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <meta http-equiv="Cache-Control" content="no-store"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <style>
    .emp-sidebar-profile { padding: 14px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .emp-sidebar-name { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.3; margin-bottom: 2px; }
    .emp-sidebar-id   { font-size: 11px; color: var(--amber); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
    .emp-sidebar-site { font-size: 10.5px; color: rgba(255,255,255,0.38); line-height: 1.4; }
    #authOverlay { position: fixed; inset: 0; background: var(--white); display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 13px; color: var(--text-muted); }
    .dash-content { padding: 40px 56px; }
    @media (max-width: 900px) { .dash-content { padding: 28px 24px; } }
    .dash-section-title { font-size: 9px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }

    /* New incident form */
    .inc-form-card {
      background: var(--white); border: 1px solid var(--border);
      padding: 28px 28px 32px; max-width: 620px; margin-bottom: 48px;
    }
    .inc-form-card h3 {
      font-size: 15px; font-weight: 800; color: var(--navy);
      margin-bottom: 20px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .inc-form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 600px) { .inc-form-grid { grid-template-columns: 1fr; } }
    .inc-form-full { grid-column: 1 / -1; }

    /* Incident history list */
    .incident-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 18px 0; border-bottom: 1px solid var(--border); max-width: 720px;
    }
    .incident-item:last-child { border-bottom: none; }
    .incident-id {
      font-size: 9px; font-weight: 700; color: var(--amber); text-transform: uppercase;
      letter-spacing: 1px; background: var(--amber-soft); padding: 3px 8px;
      white-space: nowrap; flex-shrink: 0; margin-top: 2px;
    }
    .incident-body { flex: 1; min-width: 0; }
    .incident-type {
      font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px;
    }
    .incident-desc {
      font-size: 12.5px; color: var(--text-mid); margin-bottom: 6px; line-height: 1.55;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .incident-meta { font-size: 11px; color: var(--text-faint); display: flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>

<div id="authOverlay">Checking access…</div>

<button class="mobile-nav-toggle" id="navToggle" aria-label="Open navigation" style="display:none;">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<div class="layout" id="portalLayout" style="display:none;">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="../index.html" class="logo-link">
        <div class="logo-img-wrap">
          <img src="../assets/images/logos/vagt-logo-white.png" alt="VAGT" class="logo-img">
        </div>
        <div class="logo-text-block">
          <div class="logo-wordmark">VAGT</div>
          <div class="logo-sub">Security Services</div>
        </div>
      </a>
    </div>
    <div class="emp-sidebar-profile">
      <div class="emp-sidebar-name" id="sidebarName">—</div>
      <div class="emp-sidebar-id"   id="sidebarId">—</div>
      <div class="emp-sidebar-site" id="sidebarSite">—</div>
    </div>
    <nav class="sidebar-nav" aria-label="Employee portal">
      <div class="nav-group-label">My Portal</div>
      <a href="employee-portal.html" class="nav-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a href="employee-schedule.html" class="nav-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        My Schedule
      </a>
      <a href="employee-incidents.html" class="nav-link active">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Incident Reports
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="signOutBtn" class="btn btn-ghost portal-signout" style="margin:0 20px 12px;">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="section-label">Employee Portal</div>
      <h1>Incident Reports</h1>
      <p>File a new report or review your submitted incidents.</p>
    </div>

    <div class="dash-content">

      <!-- File new incident -->
      <div class="dash-section-title">File New Incident</div>
      <div class="inc-form-card">
        <h3>New Incident Report</h3>
        <div id="incidentError"   class="portal-error"       style="display:none;" role="alert"></div>
        <div id="incidentSuccess" class="portal-success-msg" style="display:none;" role="status"></div>
        <form id="incidentForm" novalidate>
          <div class="inc-form-grid">
            <div class="form-group">
              <label for="incType">Incident type</label>
              <select id="incType" required>
                <option value="">— Select —</option>
                <option>Trespassing</option>
                <option>Theft / Attempted theft</option>
                <option>Vandalism</option>
                <option>Medical emergency</option>
                <option>Fire / Smoke</option>
                <option>Suspicious activity</option>
                <option>Equipment failure</option>
                <option>Altercation</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="incSite">Site / Location</label>
              <input type="text" id="incSite" placeholder="e.g. HatsOff HQ — Gate 2" required/>
            </div>
            <div class="form-group">
              <label for="incDate">Date of incident</label>
              <input type="date" id="incDate" required/>
            </div>
            <div class="form-group">
              <label for="incTime">Approximate time</label>
              <input type="time" id="incTime"/>
            </div>
            <div class="form-group inc-form-full">
              <label for="incDesc">Description</label>
              <textarea id="incDesc" rows="4" required
                placeholder="Describe what happened, who was involved, and any actions you took."></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-navy" id="submitIncBtn">Submit Report</button>
        </form>
      </div>

      <!-- Incident history -->
      <div class="dash-section-title">My Reports</div>
      <div id="incidentsList">
        <div style="font-size:13px; color:var(--text-muted);">Loading your reports…</div>
      </div>

    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script>
(function () {
  'use strict';

  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  function setText(id, t) { const el = document.getElementById(id); if (el) el.textContent = t; }
  function setHTML(id, h) { const el = document.getElementById(id); if (el) el.innerHTML = h; }
  function show(id)       { document.getElementById(id).style.display = ''; }
  function hide(id)       { document.getElementById(id).style.display = 'none'; }
  function showMsg(id, m) { document.getElementById(id).textContent = m; show(id); }

  function fmtTimestamp(ts) {
    if (!ts) return '—';
    return ts.toDate().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
  }

  function statusPillClass(status) {
    const map = { submitted:'pill-open', acknowledged:'pill-progress', resolved:'pill-resolved', closed:'pill-closed' };
    return map[(status||'').toLowerCase()] || 'pill-open';
  }

  // Set today's date as default
  document.getElementById('incDate').value = (function () {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  })();

  // ── Submit incident ────────────────────────────────────────────────────────
  let currentUid = null;

  document.getElementById('incidentForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!currentUid) return;

    const btn = document.getElementById('submitIncBtn');
    hide('incidentError'); hide('incidentSuccess');

    const type = document.getElementById('incType').value;
    const site = document.getElementById('incSite').value.trim();
    const desc = document.getElementById('incDesc').value.trim();
    const date = document.getElementById('incDate').value;
    const time = document.getElementById('incTime').value;

    if (!type || !site || !desc || !date) {
      showMsg('incidentError', 'Please fill in all required fields.');
      return;
    }

    btn.textContent = 'Submitting…';
    btn.disabled = true;

    try {
      await db.collection('incidents').add({
        employee_uid: currentUid,
        type:         type,
        site:         site,
        description:  desc,
        incident_date: date,
        incident_time: time || null,
        status:        'submitted',
        submitted_at:  firebase.firestore.FieldValue.serverTimestamp(),
      });

      showMsg('incidentSuccess', 'Report submitted. Your supervisor will be notified.');
      document.getElementById('incidentForm').reset();
      document.getElementById('incDate').value = date; // keep date default
      loadIncidents(currentUid);
    } catch (err) {
      showMsg('incidentError', 'Submission failed: ' + err.message);
    }
    btn.textContent = 'Submit Report';
    btn.disabled = false;
  });

  // ── Load incident history ──────────────────────────────────────────────────
  async function loadIncidents(uid) {
    try {
      const snap = await db.collection('incidents')
        .where('employee_uid', '==', uid)
        .orderBy('submitted_at', 'desc')
        .limit(20)
        .get();

      if (snap.empty) {
        setHTML('incidentsList', '<div class="portal-empty-state"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>No incidents filed yet.</div>');
        return;
      }

      const html = snap.docs.map(function (doc, i) {
        const d = doc.data();
        const pillCls = statusPillClass(d.status);
        const refNum  = 'INC-' + String(i + 1).padStart(3, '0');
        return `
          <div class="incident-item">
            <div class="incident-id">${refNum}</div>
            <div class="incident-body">
              <div class="incident-type">${d.type || 'Incident'}</div>
              <div class="incident-desc">${d.description || ''}</div>
              <div class="incident-meta">
                <span>${d.site || '—'}</span>
                <span>${d.incident_date || '—'}</span>
                <span>Filed: ${fmtTimestamp(d.submitted_at)}</span>
                <span class="complaint-status-pill ${pillCls}">${d.status || 'submitted'}</span>
              </div>
            </div>
          </div>`;
      }).join('');
      setHTML('incidentsList', html);
    } catch (e) {
      console.error('Incidents load failed:', e);
      setHTML('incidentsList', '<div style="font-size:13px; color:var(--text-muted);">Could not load reports. Please refresh.</div>');
    }
  }

  // ── Nav & auth ─────────────────────────────────────────────────────────────
  document.getElementById('navToggle').addEventListener('click', function () {
    document.getElementById('sidebar').classList.toggle('open');
  });
  document.getElementById('signOutBtn').addEventListener('click', function () {
    auth.signOut().then(function () { window.location.href = 'portal.html'; });
  });

  auth.onAuthStateChanged(async function (user) {
    if (!user) { window.location.href = 'portal.html'; return; }
    const token = await user.getIdTokenResult();
    if (token.claims.role && token.claims.role !== 'employee') { window.location.href = 'portal.html'; return; }

    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('portalLayout').style.display = '';
    document.getElementById('navToggle').style.display = '';

    currentUid = user.uid;

    // Sidebar profile
    try {
      const snap = await db.collection('employees').doc(user.uid).get();
      if (snap.exists) {
        const d = snap.data();
        setText('sidebarName', d.name || '—');
        setText('sidebarId',   d.employee_id || '—');
        setText('sidebarSite', d.site_name ? ('Site: ' + d.site_name) : 'No site assigned');
        // Pre-fill site in the incident form
        if (d.site_name) document.getElementById('incSite').value = d.site_name;
      }
    } catch (e) { /* sidebar not critical */ }

    loadIncidents(user.uid);
  });

})();
</script>
</body>
</html>
