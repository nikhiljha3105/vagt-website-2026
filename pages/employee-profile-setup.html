<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  VAGT AUTH PAGE — HEADER SPEC (DO NOT DEVIATE)                      ║
  ║                                                                      ║
  ║  All auth pages (portal.html, register.html) MUST share this exact  ║
  ║  header structure to maintain visual consistency:                   ║
  ║                                                                      ║
  ║  <div class="portal-login-header">                                  ║
  ║    <div style="margin-bottom:20px; display:flex;                     ║
  ║                justify-content:space-between; align-items:center;"> ║
  ║      <div style="min-width:80px;"></div> [left spacer]              ║
  ║      <img [logo] style="height:48px; opacity:0.95;"/>               ║
  ║      <div style="min-width:80px; display:flex;                       ║
  ║                   justify-content:flex-end;">                        ║
  ║        <[pill action button or link]                                 ║
  ║          style="font-size:11px; font-weight:600;                     ║
  ║                 border:1px solid var(--border);                     ║
  ║                 border-radius:20px; padding:4px 12px; ..."/>        ║
  ║      </div>                                                          ║
  ║    </div>                                                            ║
  ║    <div class="portal-login-icon">[SVG icon]</div>                  ║
  ║    <div class="portal-role-badge">[page context label]</div>        ║
  ║    <h2>[primary heading]</h2>                                        ║
  ║    <p>[subtext]</p>                                                  ║
  ║  </div>                                                              ║
  ║                                                                      ║
  ║  portal.html    → pill = language toggle (हिंदी / EN)               ║
  ║  register.html  → pill = "Sign in" link back to portal.html         ║
  ║  profile pages  → pill = empty spacers (no action buttons)           ║
  ║                                                                      ║
  ║  Logo height: 48px (centered via 3-column layout)                   ║
  ║  Background: .portal-login-wrap { background: #f0f0ec; }            ║
  ║  Card max-width and padding: defined in main.css (.portal-login-card)║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complete Your Profile | VAGT Security Services</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="description" content="VAGT Security Services — complete your profile. Restricted access."/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
</head>
<body>
<div class="portal-login-wrap">
  <div class="portal-login-card">

    <div class="portal-login-header">
      <div style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
        <div style="min-width:80px;"></div>
        <img src="../assets/images/logos/vagt-logo-actual.jpg" alt="VAGT Security Services" style="height:48px; opacity:0.95;"/>
        <div style="min-width:80px;"></div>
      </div>
      <div class="portal-login-icon">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
      </div>
      <div class="portal-role-badge">Welcome to VAGT</div>
      <h2>Tell us about your role</h2>
      <p>This helps us show you the right information. Takes 10 seconds.</p>
    </div>

    <div class="portal-login-body">

      <div id="profileError" class="portal-error" style="display:none;" role="alert"></div>

      <!-- Role selector grid -->
      <div style="margin-bottom:32px;">
        <label style="display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-faint); margin-bottom:12px;">Select your role</label>
        <div id="roleGrid" class="role-tile-grid">
          <!-- Tiles will be generated by JS -->
        </div>
      </div>

      <!-- Site selector (shown after role selected) -->
      <div id="siteSection" style="display:none; margin-bottom:32px;">
        <label style="display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-faint); margin-bottom:8px;">Your primary site</label>
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">The building or property you are usually posted at.</div>
        <div id="siteInputContainer">
          <input type="text" id="siteInput" placeholder="e.g. DS Max Sky Shubham, Bengaluru" maxlength="200" style="width:100%;"/>
        </div>
      </div>

      <!-- Submit button -->
      <button type="button" id="submitBtn" class="btn btn-navy" style="width:100%; justify-content:center;" disabled>
        Save and continue →
      </button>

    </div><!-- /portal-login-body -->
  </div><!-- /portal-login-card -->
</div><!-- /portal-login-wrap -->

<style>
  .portal-login-wrap { background: #f0f0ec; }

  .role-tile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .role-tile {
    cursor: pointer;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .role-tile:hover {
    border-color: var(--navy);
    background: rgba(13,31,60,0.02);
  }

  .role-tile-active {
    border-color: var(--navy);
    background: rgba(13,31,60,0.06);
  }

  .role-tile svg {
    width: 32px;
    height: 32px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .role-tile-active svg {
    color: var(--navy);
  }

  .role-tile-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .role-tile-active .role-tile-label {
    color: var(--navy);
  }

  @media (max-width: 600px) {
    .role-tile-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<!-- Firebase v10 compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script>
(function () {
  'use strict';

  // ── Init ──────────────────────────────────────────────────────────────────
  let auth, db;
  try {
    const app = firebase.apps.length === 0
      ? firebase.initializeApp(FIREBASE_CONFIG)
      : firebase.app();
    auth = app.auth();
    db   = app.firestore();
  } catch (e) {
    document.getElementById('profileError').textContent = 'Portal is not configured. Contact your VAGT administrator.';
    document.getElementById('profileError').style.display = '';
    return;
  }

  // ── Auth guard ────────────────────────────────────────────────────────────
  auth.onAuthStateChanged(function (user) {
    if (!user) {
      window.location.href = 'portal.html';
    }
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function show(id)       { document.getElementById(id).style.display = ''; }
  function hide(id)       { document.getElementById(id).style.display = 'none'; }
  function setText(id, t) { document.getElementById(id).textContent = t; }

  // ── Role tile definitions ─────────────────────────────────────────────────
  const roles = [
    { id: 'security_guard', label: 'Security Guard', icon: 'shield' },
    { id: 'security_officer', label: 'Security Officer', icon: 'shield' },
    { id: 'facility_officer', label: 'Facility Officer', icon: 'building' },
    { id: 'housekeeper', label: 'Housekeeper', icon: 'person' },
    { id: 'facility_manager', label: 'Facility Manager', icon: 'building' },
    { id: 'electrician', label: 'Electrician', icon: 'wrench' },
    { id: 'plumber', label: 'Plumber', icon: 'wrench' },
    { id: 'office_boy', label: 'Office Boy', icon: 'person' },
    { id: 'operations_manager', label: 'Operations Manager', icon: 'building' },
    { id: 'operations_director', label: 'Operations Director', icon: 'building' },
  ];

  function getSvgIcon(type) {
    const icons = {
      shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      building: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
      wrench: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 1 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
      person: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
    };
    return icons[type] || icons.person;
  }

  // ── Render role tiles ─────────────────────────────────────────────────────
  let selectedRole = null;

  function renderRoleTiles() {
    const grid = document.getElementById('roleGrid');
    grid.innerHTML = '';
    roles.forEach(role => {
      const tile = document.createElement('div');
      tile.className = 'role-tile';
      tile.innerHTML = getSvgIcon(role.icon) + '<span class="role-tile-label">' + role.label + '</span>';
      tile.addEventListener('click', () => selectRole(role.id, tile));
      grid.appendChild(tile);
    });
  }

  function selectRole(roleId, tileEl) {
    selectedRole = roleId;
    document.querySelectorAll('.role-tile').forEach(t => t.classList.remove('role-tile-active'));
    tileEl.classList.add('role-tile-active');
    show('siteSection');
    document.getElementById('submitBtn').disabled = false;
  }

  renderRoleTiles();

  // ── Submit handler ────────────────────────────────────────────────────────
  document.getElementById('submitBtn').addEventListener('click', async function () {
    if (!selectedRole) return;

    const primarySite = document.getElementById('siteInput').value.trim() || '';

    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Saving…';
    hide('profileError');

    try {
      const user = auth.currentUser;
      const token = await user.getIdToken();

      const resp = await fetch('/api/employee/profile', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({
          role_detail: selectedRole,
          primary_site: primarySite,
        }),
      });

      if (!resp.ok) {
        const data = await resp.json();
        document.getElementById('profileError').textContent = data.message || 'Could not save your profile. Check your connection and try again.';
        show('profileError');
        btn.disabled = false;
        btn.textContent = 'Save and continue →';
        return;
      }

      // Success — redirect to employee portal
      window.location.href = 'employee-portal.html';
    } catch (err) {
      document.getElementById('profileError').textContent = 'Could not save your profile. Check your connection and try again.';
      show('profileError');
      btn.disabled = false;
      btn.textContent = 'Save and continue →';
    }
  });

})();
</script>
</body>
</html>
