<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  VAGT AUTH PAGE — HEADER SPEC (DO NOT DEVIATE)                      ║
  ║                                                                      ║
  ║  All auth pages (portal.html, register.html) MUST share this exact  ║
  ║  header structure to maintain visual consistency:                   ║
  ║                                                                      ║
  ║  <div class="portal-login-header">                                  ║
  ║    <div style="margin-bottom:20px; display:flex;                     ║
  ║                justify-content:space-between; align-items:center;"> ║
  ║      <div style="min-width:80px;"></div> [left spacer]              ║
  ║      <img [logo] style="height:48px; opacity:0.95;"/>               ║
  ║      <div style="min-width:80px; display:flex;                       ║
  ║                   justify-content:flex-end;">                        ║
  ║        <[pill action button or link]                                 ║
  ║          style="font-size:11px; font-weight:600;                     ║
  ║                 border:1px solid var(--border);                     ║
  ║                 border-radius:20px; padding:4px 12px; ..."/>        ║
  ║      </div>                                                          ║
  ║    </div>                                                            ║
  ║    <div class="portal-login-icon">[SVG icon]</div>                  ║
  ║    <div class="portal-role-badge">[page context label]</div>        ║
  ║    <h2>[primary heading]</h2>                                        ║
  ║    <p>[subtext]</p>                                                  ║
  ║  </div>                                                              ║
  ║                                                                      ║
  ║  portal.html    → pill = language toggle (हिंदी / EN)               ║
  ║  register.html  → pill = "Sign in" link back to portal.html         ║
  ║  profile pages  → pill = empty spacers (no action buttons)           ║
  ║                                                                      ║
  ║  Logo height: 48px (centered via 3-column layout)                   ║
  ║  Background: .portal-login-wrap { background: #f0f0ec; }            ║
  ║  Card max-width and padding: defined in main.css (.portal-login-card)║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complete Your Profile | VAGT Security Services</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="description" content="VAGT Security Services — complete your profile. Restricted access."/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
</head>
<body>
<div class="portal-login-wrap">
  <div class="portal-login-card">

    <div class="portal-login-header">
      <div style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
        <div style="min-width:80px;"></div>
        <img src="../assets/images/logos/vagt-logo-actual.jpg" alt="VAGT Security Services" style="height:48px; opacity:0.95;"/>
        <div style="min-width:80px;"></div>
      </div>
      <div class="portal-login-icon">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
      </div>
      <div class="portal-role-badge">Welcome to VAGT</div>
      <h2>Tell us about your role</h2>
      <p>This helps us show you the right information. Takes 10 seconds.</p>
    </div>

    <div class="portal-login-body">

      <div id="profileError" class="portal-error" style="display:none;" role="alert"></div>

      <!-- ── Step A: Pick work family ── -->
      <div id="stepFamily">
        <div class="ps-step-label">What type of work do you do?</div>
        <div class="ps-family-grid">
          <button type="button" class="ps-family-tile" data-family="security">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="ps-family-label">Security</span>
            <span class="ps-family-sub">Guards, Officers, Fire, CCTV</span>
          </button>
          <button type="button" class="ps-family-tile" data-family="facility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="ps-family-label">Facility Management</span>
            <span class="ps-family-sub">Housekeeping, Technical, FM</span>
          </button>
          <button type="button" class="ps-family-tile" data-family="operations">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><path d="M12 8v3"/><circle cx="5" cy="17" r="3"/><circle cx="19" cy="17" r="3"/><path d="M5 14v-2a7 7 0 0 1 14 0v2"/></svg>
            <span class="ps-family-label">Operations & Management</span>
            <span class="ps-family-sub">Supervisors, Managers, HO</span>
          </button>
        </div>
      </div>

      <!-- ── Step B: Pick specific designation ── -->
      <div id="stepDesig" style="display:none;">
        <button type="button" id="backToFamily" class="ps-back-btn">← Change category</button>
        <div class="ps-step-label" id="desigLabel">Select your designation</div>
        <div id="desigGrid" class="ps-desig-grid">
          <!-- populated by JS -->
        </div>
      </div>

      <!-- ── Step C: Site entry (shown after designation chosen) ── -->
      <div id="stepSite" style="display:none; margin-top:24px;">
        <div class="ps-step-label">Your primary site <span style="font-weight:400; text-transform:none; color:var(--text-muted); letter-spacing:0;">(optional)</span></div>
        <input type="text" id="siteInput" placeholder="e.g. DS Max Sky Shubham, Bengaluru" maxlength="200" style="width:100%; margin-top:6px;"/>
        <div style="font-size:11px; color:var(--text-muted); margin-top:5px;">The building or property you are usually posted at.</div>
      </div>

      <!-- Submit button -->
      <button type="button" id="submitBtn" class="btn btn-navy" style="width:100%; justify-content:center; margin-top:24px; display:none;">
        Save and continue →
      </button>

    </div><!-- /portal-login-body -->
  </div><!-- /portal-login-card -->
</div><!-- /portal-login-wrap -->

<style>
  .portal-login-wrap { background: #f0f0ec; }

  /* ── Step labels ── */
  .ps-step-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-faint); margin-bottom: 12px;
  }

  /* ── Family tiles (3 large tiles) ── */
  .ps-family-grid { display: flex; flex-direction: column; gap: 10px; }
  .ps-family-tile {
    cursor: pointer; border: 2px solid var(--border); border-radius: 10px;
    padding: 16px 18px; text-align: left; transition: all 0.15s;
    display: flex; align-items: center; gap: 14px; background: var(--white);
    font-family: var(--font);
  }
  .ps-family-tile:hover { border-color: var(--navy); background: rgba(13,31,60,0.025); }
  .ps-family-tile.active { border-color: var(--navy); background: rgba(13,31,60,0.06); }
  .ps-family-tile svg { width: 28px; height: 28px; flex-shrink: 0; color: var(--text-muted); }
  .ps-family-tile.active svg { color: var(--navy); }
  .ps-family-label { font-size: 13.5px; font-weight: 700; color: var(--text); display: block; line-height: 1.3; }
  .ps-family-sub { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }

  /* ── Back button ── */
  .ps-back-btn {
    background: none; border: none; font-family: var(--font); cursor: pointer;
    font-size: 11px; color: var(--text-muted); padding: 0; margin-bottom: 16px;
    text-decoration: underline;
  }
  .ps-back-btn:hover { color: var(--navy); }

  /* ── Designation chips ── */
  .ps-desig-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .ps-desig-chip {
    cursor: pointer; border: 1.5px solid var(--border); border-radius: 20px;
    padding: 7px 14px; font-family: var(--font); font-size: 12px; font-weight: 600;
    color: var(--text-mid); background: var(--white); transition: all 0.14s;
  }
  .ps-desig-chip:hover { border-color: var(--navy); color: var(--navy); background: rgba(13,31,60,0.03); }
  .ps-desig-chip.active { border-color: var(--navy); background: var(--navy); color: var(--white); }
  .ps-desig-chip.supervisor { border-color: var(--amber-dark); color: #7a5900; }
  .ps-desig-chip.supervisor.active { background: var(--amber); border-color: var(--amber-dark); color: var(--navy); }
</style>

<!-- Firebase v10 compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script>
(function () {
  'use strict';

  // ── Init ──────────────────────────────────────────────────────────────────
  let auth, db;
  try {
    const app = firebase.apps.length === 0
      ? firebase.initializeApp(FIREBASE_CONFIG)
      : firebase.app();
    auth = app.auth();
    db   = app.firestore();
  } catch (e) {
    document.getElementById('profileError').textContent = 'Portal is not configured. Contact your VAGT administrator.';
    document.getElementById('profileError').style.display = '';
    return;
  }

  // ── Auth guard ────────────────────────────────────────────────────────────
  auth.onAuthStateChanged(function (user) {
    if (!user) {
      window.location.href = 'portal.html';
    }
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function show(id)       { document.getElementById(id).style.display = ''; }
  function hide(id)       { document.getElementById(id).style.display = 'none'; }
  function setText(id, t) { document.getElementById(id).textContent = t; }

  // ── Role families and industry-standard designations ─────────────────────
  // supervisor: true = eligible for team management privileges (admin grants final)
  const ROLE_FAMILIES = {
    security: {
      label: 'Security',
      roles: [
        { id: 'security_guard',          label: 'Security Guard' },
        { id: 'senior_security_guard',   label: 'Senior Security Guard' },
        { id: 'fire_guard',              label: 'Fire Guard' },
        { id: 'fire_officer',            label: 'Fire Officer' },
        { id: 'cctv_operator',           label: 'CCTV Operator' },
        { id: 'access_control_operator', label: 'Access Control Operator' },
        { id: 'qrt_member',              label: 'QRT Member' },
        { id: 'security_shift_incharge', label: 'Security Shift Incharge', supervisor: true },
        { id: 'security_officer',        label: 'Security Officer',        supervisor: true },
      ],
    },
    facility: {
      label: 'Facility Management',
      roles: [
        { id: 'housekeeping_attendant',  label: 'Housekeeping Attendant' },
        { id: 'housekeeping_supervisor', label: 'Housekeeping Supervisor' },
        { id: 'office_assistant',        label: 'Office Assistant' },
        { id: 'pantry_staff',            label: 'Pantry Staff' },
        { id: 'electrician',             label: 'Electrician' },
        { id: 'plumber',                 label: 'Plumber' },
        { id: 'ac_technician',           label: 'AC / MEP Technician' },
        { id: 'soft_services_executive', label: 'Soft Services Executive' },
        { id: 'facility_executive',      label: 'Facility Executive' },
        { id: 'facility_officer',        label: 'Facility Officer',        supervisor: true },
        { id: 'facility_manager',        label: 'Facility Manager',        supervisor: true },
      ],
    },
    operations: {
      label: 'Operations & Management',
      roles: [
        { id: 'hr_executive',            label: 'HR Executive' },
        { id: 'admin_executive',         label: 'Admin Executive' },
        { id: 'area_manager',            label: 'Area Manager',            supervisor: true },
        { id: 'operations_manager',      label: 'Operations Manager',      supervisor: true },
        { id: 'operations_director',     label: 'Operations Director',     supervisor: true },
      ],
    },
  };

  let selectedFamily   = null;
  let selectedDesigId  = null;
  let selectedDesigLabel = null;
  let isSupervisor     = false;

  // ── Step A: Family selection ──────────────────────────────────────────────
  document.querySelectorAll('.ps-family-tile').forEach(btn => {
    btn.addEventListener('click', function () {
      selectedFamily = this.dataset.family;
      document.querySelectorAll('.ps-family-tile').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      renderDesigChips(selectedFamily);
      hide('stepFamily');
      show('stepDesig');
      hide('stepSite');
      hide('submitBtn');
      selectedDesigId = null;
    });
  });

  // ── Back button ───────────────────────────────────────────────────────────
  document.getElementById('backToFamily').addEventListener('click', function () {
    hide('stepDesig');
    hide('stepSite');
    hide('submitBtn');
    show('stepFamily');
    selectedFamily = null;
    selectedDesigId = null;
  });

  // ── Step B: Designation chips ─────────────────────────────────────────────
  function renderDesigChips(family) {
    const grid  = document.getElementById('desigGrid');
    const label = document.getElementById('desigLabel');
    const fam   = ROLE_FAMILIES[family];
    label.textContent = 'Select your designation — ' + fam.label;
    grid.innerHTML = '';
    fam.roles.forEach(role => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'ps-desig-chip' + (role.supervisor ? ' supervisor' : '');
      chip.textContent = role.label + (role.supervisor ? ' ★' : '');
      chip.title = role.supervisor ? 'Supervisor role — eligible for team management' : '';
      chip.addEventListener('click', function () {
        document.querySelectorAll('.ps-desig-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        selectedDesigId    = role.id;
        selectedDesigLabel = role.label;
        isSupervisor       = !!role.supervisor;
        show('stepSite');
        document.getElementById('submitBtn').style.display = '';
      });
      grid.appendChild(chip);
    });
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  document.getElementById('submitBtn').addEventListener('click', async function () {
    if (!selectedFamily || !selectedDesigId) return;
    const primarySite = document.getElementById('siteInput').value.trim() || '';
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Saving…';
    hide('profileError');

    try {
      const token = await auth.currentUser.getIdToken();
      const resp = await fetch('/api/employee/profile', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          role_detail:      selectedDesigId,
          role_family:      selectedFamily,
          designation:      selectedDesigLabel,
          supervisor_tier:  isSupervisor,
          primary_site:     primarySite,
        }),
      });
      if (!resp.ok) {
        const d = await resp.json().catch(() => ({}));
        document.getElementById('profileError').textContent = d.message || 'Could not save your profile. Check your connection and try again.';
        show('profileError');
        btn.disabled = false;
        btn.textContent = 'Save and continue →';
        return;
      }
      window.location.href = 'employee-portal.html';
    } catch {
      document.getElementById('profileError').textContent = 'Could not save your profile. Check your connection and try again.';
      show('profileError');
      btn.disabled = false;
      btn.textContent = 'Save and continue →';
    }
  });

})();
</script>
</body>
</html>
